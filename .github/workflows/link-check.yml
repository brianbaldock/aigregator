name: Link check

on:
  pull_request:
    paths:
      - 'digests/**'
      - 'docs/**'
      - 'scripts/build.py'
      - 'lychee.toml'
  workflow_dispatch:
  schedule:
    # Weekly sweep, Sundays 09:00 UTC
    - cron: '0 9 * * 0'

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          # Config (accept-list, excludes, user-agent) lives in lychee.toml at
          # the repo root so local `lychee` runs see the same rules as CI.
          args: >-
            --config lychee.toml
            './docs/**/*.html'
            './digests/**/*.md'
          fail: true
          format: markdown
          output: ./lychee-report.md
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: lychee-report.md
